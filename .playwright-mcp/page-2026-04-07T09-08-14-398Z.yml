                - heading "流程提示" [level=2] [ref=e192]
                - paragraph [ref=e193]: 这个 Agent 的目标，是把 1 条英语长难句沉淀成可复用的教学资产：文本解析、模块化条漫、句子讲解文章、配音和视频，并让每一步都可追溯、可重生成。
            - generic [ref=e194]:
              - paragraph [ref=e195]: 1. 首页录入：填写英语原句、书名作者，上传 5 张模块参考图，勾选要产出的模块后发起文本解析。
              - paragraph [ref=e196]: 2. 文本编辑：系统先生成翻译、分句 prompt1-4、句式分析、词汇解析和雅思建议；你可以逐段修改、保存草稿，或按单个模块 / 全部重新生成。
              - paragraph [ref=e197]: 3. 图片生成：确认文本版本后进入任务详情页，系统按所选模块顺序生成条漫图片，实时记录日志、进度和每个模块的结果状态。
              - paragraph [ref=e198]: 4. 结果延展：结果页支持查看源文本、下载或基于改写内容重新生成图片；当五张解析图齐全后，还能继续生成句子讲解文章、讲解配音和讲解视频。
              - paragraph [ref=e199]: 5. 历史追溯：每次确认生成、重生成或讲解产出都会形成历史记录，可从历史记录直接回到当时的最终页面继续查看或发起新一轮生成。